schema_version: 1

context:
  name: google-cloud-firestore
  version: "2.24.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: e7f831f150e787c46ac3a96407f58d9edccd5455dbc9dae472f4cadb6daf6dc9

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=1.34.1,<3.0.0,!=2.0.*,!=2.1.*,!=2.2.*,!=2.3.*,!=2.4.*,!=2.5.*,!=2.6.*,!=2.7.*,!=2.8.*,!=2.9.*,!=2.10.*
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    - google-cloud-core >=1.4.1,<3.0.0
    # use the most restrictive constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # use the most restrictive constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=3.20.2,<7.0.0,!=4.21.0,!=4.21.1,!=4.21.2,!=4.21.3,!=4.21.4,!=4.21.5

tests:
  - python:
      imports:
        - google.cloud.firestore
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Python Client for Google Cloud Firestore
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-firestore
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-firestore
  documentation: https://cloud.google.com/products/firestore

extra:
  recipe-maintainers:
    - xylar
    - mitchellsuter
